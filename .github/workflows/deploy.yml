name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - env:
          VITE_SUPABASE_URL: https://ulgwamsiuumwkgpolubj.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZ3dhbXNpdXVtd2tncG9sdWJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNjAyMzgsImV4cCI6MjA5OTkzNjIzOH0.8L01K0TCh9HnOWYEO2qLhQKoc6bsDciiLZLzbEqdFVs
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
      - uses: actions/deploy-pages@v4
