name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Run tests
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Inject commit SHA
        run: echo "VITE_COMMIT_SHA=${{ github.sha }}" >> "$GITHUB_ENV"
      - env:
          VITE_SUPABASE_URL: https://ixlztzcassoqmyouikhj.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4bHp0emNhc3NvcW15b3Vpa2hqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3OTIyMDAsImV4cCI6MjEwMDM2ODIwMH0.UtWiI2vGqN0Ktw5YJQcZwMq_4yWYFsPDNA5LQUxi0D4
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
